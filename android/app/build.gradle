plugins {
    id "com.android.application"
}

android {
    namespace "com.dealskart.autodiary"
    compileSdk 35

    defaultConfig {
        applicationId "com.dealskart.autodiary"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }
}

tasks.register("syncWebAssets", Copy) {
    from(rootProject.file("../index.html"))
    from(rootProject.file("../styles.css"))
    from(rootProject.file("../script.js"))
    from(rootProject.file("../assets")) {
        into "assets"
    }
    into layout.projectDirectory.dir("src/main/assets/www")
}

tasks.named("preBuild") {
    dependsOn("syncWebAssets")
}
